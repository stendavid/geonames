<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoNames Suffix Explorer</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin="" />

  <!-- App CSS -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>GeoNames Suffix Explorer</h1>
  </header>

  <main>
    <section id="controls">
      <div class="control-group">
        <label>Place name suffixes</label>
        <div id="suffix-inputs-container">
          <!-- Dynamic suffix inputs will be added here -->
        </div>
      </div>

      <button id="add-suffix-btn" class="add-suffix-btn">+ Add Search Box</button>

      <div class="regex-hint">
        Regex supported — try <code>(by|ville)</code>, <code>st[ae]d</code>, or <code>borg|burg</code>
      </div>

      <div class="control-group">
        <label for="country-select">Country</label>
        <select id="country-select">
          <option value="">— Select a country —</option>
        </select>
      </div>

      <div class="control-group">
        <label for="population-input">Min. population</label>
        <input type="number" id="population-input" value="500" min="0" step="100" />
      </div>

      <div id="result-count">No results</div>
    </section>

    <section id="map-section">
      <div id="highlight-info" style="display: none;"></div>
      <div id="map"></div>
    </section>

    <aside id="regional-suffixes-panel" style="display: none;">
      <h2>Regional Suffixes</h2>
      <div class="regional-suffixes-controls">
        <label for="min-places-input">Min. places:</label>
        <input type="number" id="min-places-input" value="100" min="1" step="1" />
      </div>
      <div id="regional-suffixes-list"></div>
    </aside>
  </main>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>

  <!-- Countries Metadata -->
  <script src="data/countries.js"></script>

  <!-- App JS -->
  <script src="app.js"></script>
</body>
</html>
