<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoNames Suffix Explorer</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin="" />

  <!-- App CSS -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>GeoNames Suffix Explorer</h1>
  </header>

  <main>
    <section id="controls">
      <div class="control-group">
        <label for="suffix-input">Place name suffix 1</label>
        <div class="suffix-row">
          <span class="suffix-swatch" style="background: #2e86c1;"></span>
          <input type="text" id="suffix-input" placeholder="e.g. -by, -ville, -burg" autocomplete="off" />
        </div>
      </div>

      <div class="control-group">
        <label for="suffix-input-2">Place name suffix 2</label>
        <div class="suffix-row">
          <span class="suffix-swatch" style="background: #e74c3c;"></span>
          <input type="text" id="suffix-input-2" placeholder="e.g. -stad, -heim, -mont" autocomplete="off" />
        </div>
      </div>

      <div class="control-group">
        <label for="country-select">Country</label>
        <select id="country-select">
          <option value="">— Select a country —</option>
        </select>
      </div>

      <div class="control-group">
        <label for="population-input">Min. population</label>
        <input type="number" id="population-input" value="500" min="0" step="100" />
      </div>

      <div id="result-count">No results</div>
    </section>

    <section id="map-section">
      <div id="highlight-info" style="display: none;"></div>
      <div id="map"></div>
    </section>

    <aside id="regional-suffixes-panel" style="display: none;">
      <h2>Regional Suffixes</h2>
      <div id="regional-suffixes-list"></div>
    </aside>
  </main>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>

  <!-- Countries Metadata -->
  <script src="data/countries.js"></script>

  <!-- App JS -->
  <script src="app.js"></script>
</body>
</html>
