<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tests – GeoNames Suffix Search</title>

  <!-- Leaflet CSS (needed by app.js) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin="" />
  <style>
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      margin: 2rem;
      color: #1a1a1a;
      background: #fafafa;
    }
    h1 { font-size: 1.4rem; margin-bottom: 0.5rem; }
    p  { color: #555; margin-bottom: 1rem; }
    #test-summary {
      font-size: 1.1rem;
      font-weight: 600;
      margin-top: 1rem;
    }
    /* Keep the map/controls required by app.js but hide them */
    #controls, #map-section { display: none; }
  </style>
</head>
<body>
  <h1>GeoNames Suffix Search — Tests</h1>
  <p>Open the browser console to see detailed test output.</p>
  <div id="test-summary">Running tests…</div>

  <!-- Hidden elements required by app.js DOM queries -->
  <section id="controls">
    <select id="country-select">
      <option value="SE">Sweden</option>
      <option value="FR">France</option>
    </select>
    <input type="text" id="suffix-input" value="" />
    <input type="text" id="suffix-input-2" value="" />
    <input type="number" id="population-input" value="500" />
    <div id="result-count"></div>
  </section>
  <section id="map-section">
    <div id="map" style="width:1px;height:1px;"></div>
  </section>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>
  <!-- App + Tests -->
  <script src="app.js"></script>
  <script src="tests.js"></script>
</body>
</html>
